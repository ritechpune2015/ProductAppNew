name: Trigger auto deployment for productappnew

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/productappnew-AutoDeployTrigger-a9af4f4c-d2ee-46a3-b29a-850160935324.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PRODUCTAPPNEW_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PRODUCTAPPNEW_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PRODUCTAPPNEW_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.PRODUCTAPPNEW_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PRODUCTAPPNEW_REGISTRY_PASSWORD }}
          containerAppName: productappnew
          resourceGroup: RitechGroup
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


